services:
  backend:
    build:
      context: ./backend
    environment:
      UNICODE_BROWSER_DB: /app/data/app.sqlite3
      UNICODE_FONT_DIR: /app/data/fonts
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

